<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 2 - The Promise</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px;
            background: linear-gradient(135deg, #0c4a6e 0%, #0369a1 50%, #0ea5e9 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        /* Floating icons */
        .float-icon {
            position: absolute; font-size: 64px;
            opacity: 0.1; animation: float 8s ease-in-out infinite;
        }
        .float-icon:nth-child(1) { top: 15%; left: 10%; animation-delay: 0s; }
        .float-icon:nth-child(2) { top: 25%; right: 15%; animation-delay: 2s; }
        .float-icon:nth-child(3) { bottom: 25%; left: 20%; animation-delay: 4s; }
        .float-icon:nth-child(4) { bottom: 15%; right: 10%; animation-delay: 6s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        /* Main content */
        .content { text-align: center; z-index: 10; }
        .section-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white; padding: 12px 30px;
            border-radius: 50px; font-size: 14px;
            font-weight: 600; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .main-title {
            font-size: 80px; font-weight: 700;
            color: white; letter-spacing: -1px;
            margin-bottom: 30px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        .promise-list {
            list-style: none; max-width: 800px;
            margin: 0 auto; text-align: left;
        }
        .promise-list li {
            font-size: 22px; color: #e0f2fe;
            margin-bottom: 20px; padding-left: 50px;
            position: relative;
        }
        .promise-list li::before {
            content: "✓"; position: absolute; left: 0;
            color: #67e8f9; font-size: 28px;
            font-weight: bold;
        }
        .build-badge {
            display: inline-flex; align-items: center;
            gap: 15px; margin-top: 50px;
            background: linear-gradient(135deg, #06b6d4, #0891b2);
            padding: 20px 40px; border-radius: 12px;
            color: white; font-size: 20px; font-weight: 600;
        }
        .build-badge .emoji { font-size: 28px; }
        .timer {
            display: flex; align-items: center;
            justify-content: center; gap: 15px;
            margin-top: 40px; padding: 20px 40px;
            background: rgba(14, 165, 233, 0.3);
            border-radius: 12px;
        }
        .timer-text { color: #bae6fd; font-size: 18px; }
        .timer-duration { color: white; font-weight: 700; }
        .progress-container {
            position: absolute; bottom: 0; left: 0;
            width: 100%; height: 6px;
            background: rgba(255, 255, 255, 0.1);
        }
        .progress-bar { height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #67e8f9);
            width: 22%; transition: width 0.5s ease;
        }
        .brand-corner {
            position: absolute; top: 40px; left: 60px;
            display: flex; align-items: center; gap: 12px;
        }
        .brand-emoji { font-size: 24px; }
        .brand-text { color: white; font-size: 16px; font-weight: 600; }
        .episode-badge {
            position: absolute; top: 40px; right: 60px;
            background: rgba(255, 255, 255, 0.2);
            color: white; padding: 10px 20px;
            border-radius: 8px; font-size: 14px;
        }
    </style>
</head>
<body>
    <span class="float-icon">🤖</span>
    <span class="float-icon">💬</span>
    <span class="float-icon">📅</span>
    <span class="float-icon">⚡</span>

    <div class="brand-corner">
        <span class="brand-emoji">🤖</span>
        <span class="brand-text">AgentAICoach</span>
    </div>
    <div class="episode-badge">$47 Entry Session</div>

    <div class="content">
        <div class="section-badge">Part 2</div>
        <h1 class="main-title">THE PROMISE</h1>
        
        <ul class="promise-list">
            <li>Instant responses while you sleep</li>
            <li>Smart qualification without lifting a finger</li>
            <li>Calendar booking on autopilot</li>
            <li>Full context when YOU step in</li>
        </ul>

        <div class="build-badge">
            <span class="emoji">🔧</span>
            <span>We're building this together, live, right now</span>
        </div>

        <div class="timer">
            <span class="timer-text">Get ready to build · <span class="timer-duration">05:00 – 10:00</span></span>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
</body>
</html>
