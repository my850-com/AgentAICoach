<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width: 1200px;
            height: 800px;
            background: linear-gradient(135deg, #1a365d 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .card {
            text-align: center;
            padding: 60px;
        }
        .icon {
            font-size: 120px;
            margin-bottom: 30px;
        }
        .title {
            font-size: 72px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }
        .price {
            font-size: 96px;
            font-weight: 900;
            color: #06b6d4;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 32px;
            color: rgba(255,255,255,.7);
            margin-bottom: 40px;
        }
        .features {
            font-size: 28px;
            color: rgba(255,255,255,.8);
            line-height: 1.6;
        }
        .feature {
            margin: 10px 0;
        }
        .brand {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            color: rgba(255,255,255,.5);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎥</div>
        <div class="title">AI QUICK START</div>
        <div class="price">$47</div>
        <div class="subtitle">On-Demand Video Training</div>
        <div class="features">
            <div class="feature">✓ 35-45 minute video</div>
            <div class="feature">✓ 20+ prompt templates</div>
            <div class="feature">✓ Instant access</div>
        </div>
    </div>
    <div class="brand">AGENTAICOACH.COM</div>
</body>
</html>
