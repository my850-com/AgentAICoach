<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width: 2048px;
            height: 2048px;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d9488 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            width: 1800px;
            height: 1800px;
            background: rgba(255,255,255,.03);
            border: 3px solid rgba(6,182,212,.2);
            border-radius: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            text-align: center;
            position: relative;
        }
        .icon {
            font-size: 280px;
            margin-bottom: 60px;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,.3));
        }
        .title {
            font-size: 140px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: -4px;
            text-shadow: 0 10px 30px rgba(0,0,0,.3);
        }
        .price {
            font-size: 200px;
            font-weight: 900;
            color: #06b6d4;
            margin-bottom: 50px;
            text-shadow: 0 10px 40px rgba(6,182,212,.4);
        }
        .subtitle {
            font-size: 72px;
            color: rgba(255,255,255,.7);
            margin-bottom: 80px;
            font-weight: 600;
        }
        .features {
            font-size: 56px;
            color: rgba(255,255,255,.85);
            line-height: 1.8;
        }
        .feature {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .check { color: #22c55e; font-size: 60px; }
        .brand {
            position: absolute;
            bottom: 80px;
            font-size: 48px;
            color: rgba(255,255,255,.4);
            letter-spacing: 8px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🎥</div>
        <div class="title">AI QUICK START</div>
        <div class="price">$47</div>
        <div class="subtitle">On-Demand Video Training</div>
        <div class="features">
            <div class="feature"><span class="check">✓</span> 35-45 minute video tutorial</div>
            <div class="feature"><span class="check">✓</span> 20+ prompt templates included</div>
            <div class="feature"><span class="check">✓</span> Instant lifetime access</div>
            <div class="feature"><span class="check">✓</span> Works on any device</div>
        </div>
        <div class="brand">AGENTAICOACH.COM</div>
    </div>
</body>
</html>
