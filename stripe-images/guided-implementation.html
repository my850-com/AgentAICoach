<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            width: 1200px;
            height: 800px;
            background: linear-gradient(135deg, #1a365d 0%, #0d9488 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .card {
            text-align: center;
            padding: 60px;
        }
        .badge {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .icon {
            font-size: 120px;
            margin-bottom: 30px;
        }
        .title {
            font-size: 64px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }
        .price {
            font-size: 96px;
            font-weight: 900;
            color: #22c55e;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 32px;
            color: rgba(255,255,255,.8);
            margin-bottom: 40px;
        }
        .features {
            font-size: 28px;
            color: rgba(255,255,255,.9);
            line-height: 1.6;
        }
        .feature {
            margin: 10px 0;
        }
        .brand {
            position: absolute;
            bottom: 60px;
            font-size: 24px;
            color: rgba(255,255,255,.5);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">BEST VALUE</div>
        <div class="icon">🎯</div>
        <div class="title">GUIDED IMPLEMENTATION</div>
        <div class="price">$1,299</div>
        <div class="subtitle">4-Week Live Program</div>
        <div class="features">
            <div class="feature">✓ 4 weekly live sessions</div>
            <div class="feature">✓ Custom prompts built for YOU</div>
            <div class="feature">✓ 1-on-1 workflow optimization</div>
        </div>
    </div>
    <div class="brand">AGENTAICOACH.COM</div>
</body>
</html>
