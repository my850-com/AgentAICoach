<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scene 5: Step 3 - Prep Data</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px;
            background: linear-gradient(135deg, #1a365d 0%, #0f172a 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ffffff; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }
        .step-number { font-size: 120px; font-weight: 900; color: rgba(6, 182, 212, 0.3); position: absolute; top: 60px; left: 80px; line-height: 1; }
        .scene-card { text-align: center; z-index: 1; padding: 80px; max-width: 1400px; }
        .scene-icon { font-size: 80px; margin-bottom: 40px; }
        .scene-title { font-size: 64px; font-weight: 800; line-height: 1.1; margin-bottom: 60px; }
        .scene-bullets { list-style: none; display: flex; flex-direction: column; gap: 24px; align-items: center; }
        .scene-bullets li { font-size: 32px; color: rgba(255, 255, 255, 0.9); display: flex; align-items: center; gap: 16px; }
        .scene-bullets li::before { content: '📊'; font-size: 28px; }
        .scene-footer {
            position: absolute; bottom: 60px; left: 0; right: 0; text-align: center;
            font-size: 24px; color: rgba(255, 255, 255, 0.5); letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="step-number">03</div>
    <div class="scene-card">
        <div class="scene-icon">📁</div>
        <h1 class="scene-title">PREP THE DATA</h1>
        <ul class="scene-bullets">
            <li>Buyer Criteria CSV</li>
            <li>Listing Hot Sheet CSV</li>
            <li>Matching Prompt</li>
        </ul>
    </div>
    <div class="scene-footer">AgentAICoach.com</div>
</body>
</html>
