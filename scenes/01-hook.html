<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scene 1: Hook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px;
            background: linear-gradient(135deg, #1a365d 0%, #0f172a 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #ffffff; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(6, 182, 212, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(6, 182, 212, 0.1) 0%, transparent 40%);
            pointer-events: none;
        }
        .scene-card { text-align: center; z-index: 1; padding: 80px; max-width: 1400px; }
        .scene-tag {
            display: inline-block; background: rgba(6, 182, 212, 0.2); color: #06b6d4;
            padding: 12px 24px; border-radius: 50px; font-size: 18px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px;
            border: 1px solid rgba(6, 182, 212, 0.3);
        }
        .scene-title {
            font-size: 72px; font-weight: 800; line-height: 1.1; margin-bottom: 30px;
            background: linear-gradient(135deg, #ffffff 0%, #06b6d4 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .scene-subtitle { font-size: 36px; font-weight: 400; color: rgba(255, 255, 255, 0.8); margin-bottom: 50px; }
        .scene-footer {
            position: absolute; bottom: 60px; left: 0; right: 0; text-align: center;
            font-size: 24px; color: rgba(255, 255, 255, 0.5); letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="scene-card">
        <div class="scene-tag">AgentAICoach Video Series</div>
        <h1 class="scene-title">AI FOR REAL ESTATE:<br>FROM OVERWHELM TO AUTOMATION</h1>
        <p class="scene-subtitle">Stop Missing Deals. Start Matching Buyers Automatically.</p>
    </div>
    <div class="scene-footer">AgentAICoach.com</div>
</body>
</html>
