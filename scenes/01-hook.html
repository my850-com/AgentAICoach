<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scene 1: Hook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 1920px; height: 1080px;
            background: linear-gradient(135deg, #1a365d 0%, #0f172a 100%);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: #fff; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(ellipse at 30% 80%, rgba(6,182,212,.2) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 20%, rgba(6,182,212,.15) 0%, transparent 40%);
            pointer-events: none;
        }
        .branding { position: absolute; top: 60px; left: 80px; font-size: 20px; font-weight: 600; color: #06b6d4; letter-spacing: 3px; }
        .content { text-align: center; z-index: 1; max-width: 1200px; }
        .series-title { font-size: 32px; font-weight: 600; color: #06b6d4; letter-spacing: 8px; margin-bottom: 40px; text-transform: uppercase; }
        .main-title { font-size: 96px; font-weight: 800; line-height: 1.1; margin-bottom: 50px; background: linear-gradient(135deg, #fff 0%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 48px; font-weight: 400; color: rgba(255,255,255,.9); }
        .emoji { font-size: 120px; margin-bottom: 40px; }
    </style>
</head>
<body>
    <div class="branding">🦞 MY850 REAL ESTATE</div>
    <div class="content">
        <div class="series-title">HOW WE BUILD IT</div>
        <div class="emoji">🏗️</div>
        <div class="main-title">DAILY HOT SHEET<br>BUYER MATCH</div>
        <div class="subtitle">AI-Powered Lead Matching in Under 5 Minutes</div>
    </div>
</body>
</html>
